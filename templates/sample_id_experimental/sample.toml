#:schema file:///groups/cryoet/cryoet/data/scratch/src/schema/schema.json
# sample.toml — researcher-authored sample-level metadata.
# One file per sample, placed at the root of the sample directory.
# The sample directory name IS the sample's identity — not repeated here.
#
# Per-acquisition parameters (resolution, microscope, defocus range, …) and
# the processing log live in {acquisition}/acquisition.toml — see
# templates/acquisition.toml.
#
# HOW TO USE
# ──────────
# 1. Replace every "<FILL IN>" placeholder with the appropriate value.
# 2. Delete the [chromatin] block if your project is not "chromatin".
# 3. Uncomment [[label]], [freezing], and [milling] blocks and fill in.
#
# EXTRA FIELDS
# ────────────
# You may add any key-value pair that is not yet in schema.py. Add it
# directly to the relevant section — the validator reports it as a warning
# but the file still passes. Example:
#
#   [chromatin]
#   substrate         = "synthetic"
#   ionic_strength_mM = 154.0   # ← extra field, not yet in schema.py
#
# If the field proves useful, notify the SciComp team so it can be
# formally added to schema.py.
#
# VALIDATION
# ──────────
# Run before committing (validates sample.toml + every acquisition.toml
# under the sample directory):
#   pixi run validate {sample_dir}


# ════════════════════════════════════════════════════════════════
# Sample conditions
# These power the coverage matrix across experimental cryoET and simulation-derived synthetic cryoET data.
# ════════════════════════════════════════════════════════════════

[sample]
lab_name        = "<FILL IN>"   # enum: collepardo | gouaux | rosen | villa
project         = "<FILL IN>"   # enum: synapse | chromatin | nanogold
# type          = "<FILL IN>"   # text, e.g. tissue | cellular | reconstituted
# cell_type     = "<FILL IN>"   # text, required if type = "cellular"
# description   = "<FILL IN>"   # text, optional free-text description


# ── Chromatin-specific  (delete this block if project = "synapse") ───────────
# Uncomment and complete the fields that apply to your substrate.

[chromatin]
# substrate             = "<FILL IN>"   # text, e.g. synthetic | native | n/a
# linker_length_bp      = "<FILL IN>"   # float, homogenous linker length in bp
# linker_pattern        = "<FILL IN>"   # list[int], patterned linker lengths, e.g. [20, 50, 20, 50]
# linker_distribution   = "<FILL IN>"   # text, free-text for non-homogenous, non-patterned linkers
# buffer                = "<FILL IN>"   # text, e.g. "2.0 mM MgCl2, 150 mM KCl"
# ptm                   = "<FILL IN>"   # text, e.g. none | H3K9me3 | H3K27me3 | H3K27Ac | H4K16Ac
# histone_variants      = "<FILL IN>"   # text, e.g. canonical | macroH2A | H2A.Z
# transcription_factors = "<FILL IN>"   # text, e.g. none | HP1a | Brd4
# nucleosome_count      = "<FILL IN>"   # integer
# dna_length_bp         = "<FILL IN>"   # integer
# nucleosome_uM         = "<FILL IN>"   # float
# # For native substrates:
# sequence_identity     = "<FILL IN>"   # text
# nucleosome_footprint  = "<FILL IN>"   # list, list of ints


# ── Gold nanoparticle labeling (uncomment and fill in) ──────────
# Copy-paste this block to add as many [[label]] entries as you have targets

# [[label]]
# label_target       = "<FILL IN>"   # text, protein name (e.g. AMPAR, NMDAR, etc.)
# aunp_type          = "<FILL IN>"   # text, monomer, dimer, trimer, etc.
# aunp_size_nm       = "<FILL IN>"   # float or list, e.g. [1.4, 2.2]
# conjugation        = "<FILL IN>"   # text, e.g. Fab | nanobody | chemical_tag | none
# conjugation_target = "<FILL IN>"   # text, e.g. GluA2, H3K9me3
# fluorophore        = "<FILL IN>"   # text, this entry was suggested by Julia P originally, so carrying it over here from [[aunp]]
# notes              = "<FILL IN>"   # text, optional


# ── Fiducial AuNPs (uncomment if used) ─────────────────────────────

# [fiducial]
# aunp_size_nm        = "<FILL IN>"   # float, fiducial diameter in nm
# vendor              = "<FILL IN>"   # text, vendor name
# catalog_number      = "<FILL IN>"   # text
# product_name        = "<FILL IN>"   # text
# concentration_value = "<FILL IN>"   # float
# concentration_unit  = "<FILL IN>"   # text


# ── Freezing / grid preparation (uncomment and fill in) ─────────

# [freezing]
# grid_type        = "<FILL IN>"   # text, e.g. "Quantifoil R2/2"
# solution_type    = "<FILL IN>"   # text, e.g. "HEPES-based"
# cryoprotectant   = "<FILL IN>"   # text, or "none"
# method           = "<FILL IN>"   # text, plunge_frozen | HPF
# # HPF-only:
# planchette_size  = "<FILL IN>"   # text, e.g. "3 mm"
# spacer_thickness = "<FILL IN>"   # text, e.g. "100 um"


# ── Milling  (uncomment and fill in) ────

# [milling]
# scheme    = "<FILL IN>"   # text, e.g. cryo-FIB
# date      = "<FILL IN>"   # date, YYYY-MM-DD
# quality   = "<FILL IN>"   # text, comment on FIB quality
