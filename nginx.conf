# Edge reverse proxy for the catalog portal.
#
# /api/* — strip the /api prefix and forward to FastAPI (its routes are
#          mounted at /samples, /scans, etc., without a /api prefix).
# /     — forward everything else to the TanStack Start SSR server.
#
# TLS is terminated upstream (cluster router in k8s; nothing in compose).

upstream api {
    server api:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100M;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
